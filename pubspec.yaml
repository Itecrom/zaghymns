name: zaghymn
description: "Zomba Assemblies of God hymn application."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish your app to the app store

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number represented as a + and a build number.
# When the version number is updated, run `flutter pub upgrade --major-versions`.
# Alternatively, update the version number manually by changing the lines below.
# Read more about versioning at https://docs.flutter.dev/deployment/android#versioning
version: 1.6.0+3

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below.
# To see which dependencies have newer versions available, run
# `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  http: ^1.2.2
  webview_flutter: ^4.10.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  # The "flutter_lints" package below contains a set of recommended lints
  # to encourage good coding practices. The lint set provided by the package
  # is activated by the `analysis_options.yaml` file located at the root of
  # your project. For details about deactivating specific lints, see
  # https://docs.flutter.dev/tools/lint#disable-lints-for-a-file.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - adds/logo.png
    - adds/chitsitsimutso.db
    - adds/verses.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://docs.flutter.dev/development/ui/assets-and-images#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://docs.flutter.dev/development/ui/assets-and-images#from-packages

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "adds/logo.png"
  min_sdk_android: 21
